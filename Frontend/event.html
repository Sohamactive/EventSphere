<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details — EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .event-banner { width: 100%; height: 300px; background-size: cover; background-position: center; position: relative; }
    .event-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6)); }
    .event-banner-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem 0;
      z-index: 2; color: #fff;
    }
    .event-banner-overlay .container { display: flex; justify-content: space-between; align-items: end; gap: 1.5rem; }
    .detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; padding: 2rem 0; }
    .detail-section { margin-bottom: 1.5rem; }
    .detail-section h3 {
      font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .detail-section h3 .material-symbols-outlined { font-size: 18px; color: var(--text-muted); }
    .detail-text { font-size: 0.9rem; line-height: 1.7; color: var(--text-secondary); }
    .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; position: sticky; top: 72px; }
    .sidebar-card h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.4rem; }
    .sidebar-card h4 .material-symbols-outlined { font-size: 18px; color: var(--text-muted); }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); }
    .info-value { font-weight: 500; color: var(--text); }
    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; }
      .event-banner { height: 200px; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <main class="main-content" id="event-container">
      <div class="spinner-center" style="padding:5rem;"><div class="spinner"></div></div>
    </main>
  </div>

  <div class="modal-overlay" id="feedback-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Submit Review</h3>
        <button class="modal-close" onclick="closeFeedbackModal()">✕</button>
      </div>
      <form onsubmit="handleFeedback(event)">
        <div class="form-group">
          <label class="form-label">Rating</label>
          <div id="feedback-rating" class="star-rating" data-rating="0" style="font-size:1.5rem;display:flex;gap:4px;margin-top:0.25rem;">
            <span class="star" data-value="1" onclick="setRating(1,'feedback-rating')" style="cursor:pointer;">★</span>
            <span class="star" data-value="2" onclick="setRating(2,'feedback-rating')" style="cursor:pointer;">★</span>
            <span class="star" data-value="3" onclick="setRating(3,'feedback-rating')" style="cursor:pointer;">★</span>
            <span class="star" data-value="4" onclick="setRating(4,'feedback-rating')" style="cursor:pointer;">★</span>
            <span class="star" data-value="5" onclick="setRating(5,'feedback-rating')" style="cursor:pointer;">★</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="feedback-comment">Your Review</label>
          <textarea class="form-textarea" id="feedback-comment" placeholder="Share your experience..." maxlength="1000"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="feedback-submit">Submit Review</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');
    initNavbar();

    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('id');
    let currentEvent = null;

    function renderLifecycle(status) {
      const steps = ['draft','published','completed'];
      const idx = steps.indexOf(status);
      const cancelled = status === 'cancelled';
      return '<div class="lifecycle">' + steps.map((s, i) => {
        let cls = 'lc-step';
        if (i < idx && !cancelled) cls += ' active';
        if (i === idx && !cancelled) cls += ' current';
        if (cancelled && s === 'completed') cls = 'lc-step';
        return `<div class="${cls}">${s.charAt(0).toUpperCase() + s.slice(1)}</div>`;
      }).join('<span class="lc-arrow">→</span>') + (cancelled ? '<div class="lc-step cancelled">Cancelled</div>' : '') + '</div>';
    }

    function renderStarsDisplay(r) { let h = '<span class="stars">'; for (let i = 1; i <= 5; i++) h += i <= r ? '★' : '☆'; return h + '</span>'; }

    async function loadEvent() {
      if (!eventId) { document.getElementById('event-container').innerHTML = '<div class="empty-state" style="padding:5rem;"><div class="empty-icon"><span class="material-symbols-outlined">error</span></div><div class="empty-title">Event not found</div><div class="empty-text">No event ID provided.</div></div>'; return; }
      try {
        const res = await api('/events/' + eventId);
        currentEvent = res.data.event;
        const e = currentEvent;
        document.title = e.title + ' — EventSphere';
        const user = Auth.getUser();
        const isOwner = user && (String(e.createdBy?._id || e.createdBy) === String(user.id) || user.role === 'admin');
        const banner = getSampleBanner(eventId.charCodeAt(0) % 6);

        let feedback = [];
        try { const f = await api('/feedback/' + eventId); feedback = f.data?.feedback || []; } catch(e) {}

        const avgRating = feedback.length ? (feedback.reduce((s,f) => s + f.rating, 0) / feedback.length).toFixed(1) : '—';

        document.getElementById('event-container').innerHTML = `
          <div class="event-banner" style="background-image:url('${banner}');">
            <div class="event-banner-overlay"><div class="container">
              <div>
                ${renderLifecycle(e.status)}
                <h1 style="font-size:1.8rem;font-weight:700;margin-top:0.5rem;">${escapeHtml(e.title)}</h1>
              </div>
              <div style="text-align:right;">
                <div style="font-size:2rem;font-weight:700;">${avgRating}</div>
                <div style="font-size:0.8rem;opacity:0.8;">${feedback.length} reviews</div>
              </div>
            </div></div>
          </div>
          <div class="container">
            <div class="detail-grid">
              <div>
                <div class="card detail-section" style="padding:1.25rem;">
                  <h3><span class="material-symbols-outlined">info</span> About This Event</h3>
                  <div class="detail-text">${escapeHtml(e.description || 'No description provided.')}</div>
                </div>
                ${isOwner ? `
                <div class="card detail-section" style="padding:1.25rem;">
                  <h3><span class="material-symbols-outlined">admin_panel_settings</span> Organizer Controls</h3>
                  <div style="display:flex;flex-wrap:wrap;gap:0.5rem;">
                    ${e.status === 'draft' ? `<button class="btn btn-success btn-sm" onclick="updateStatus('published')"><span class="material-symbols-outlined">publish</span> Publish</button>` : ''}
                    ${e.status === 'published' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus('completed')"><span class="material-symbols-outlined">check_circle</span> Complete</button>` : ''}
                    ${e.status !== 'cancelled' && e.status !== 'completed' ? `<button class="btn btn-danger btn-sm" onclick="updateStatus('cancelled')"><span class="material-symbols-outlined">cancel</span> Cancel</button>` : ''}
                    <button class="btn btn-secondary btn-sm" onclick="toggleRegistrations()"><span class="material-symbols-outlined">group</span> Attendees</button>
                  </div>
                  <div id="registrations-panel" style="margin-top:1rem;display:none;"></div>
                </div>` : ''}
                <div class="card detail-section" style="padding:1.25rem;">
                  <h3><span class="material-symbols-outlined">reviews</span> Reviews (${feedback.length})</h3>
                  ${feedback.length === 0 ? '<div class="empty-state" style="padding:1.5rem;"><div class="empty-text">No reviews yet. Be the first to share your experience.</div></div>' :
                    feedback.map(fb => `<div class="review-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;"><div style="display:flex;align-items:center;gap:0.5rem;"><div class="mini-avatar" style="margin-left:0;width:28px;height:28px;font-size:0.6rem;">${(fb.userId?.name || 'U')[0]}</div><div><div style="font-size:0.85rem;font-weight:600;">${escapeHtml(fb.userId?.name || 'User')}</div><div style="font-size:0.7rem;color:var(--text-muted);">${formatDate(fb.createdAt)}</div></div></div>${renderStarsDisplay(fb.rating)}</div><div style="font-size:0.85rem;color:var(--text-secondary);line-height:1.6;">${escapeHtml(fb.comment || '')}</div></div>`).join('')}
                </div>
              </div>
              <div>
                <div class="sidebar-card">
                  <h4><span class="material-symbols-outlined">event</span> Event Details</h4>
                  <div class="info-row"><span class="info-label">Date</span><span class="info-value">${formatDate(e.date)}</span></div>
                  <div class="info-row"><span class="info-label">Time</span><span class="info-value">${formatTime(e.date)}</span></div>
                  <div class="info-row"><span class="info-label">Deadline</span><span class="info-value">${formatDate(e.registrationDeadline)}</span></div>
                  <div class="info-row"><span class="info-label">Venue</span><span class="info-value">${escapeHtml(e.venue || 'TBA')}</span></div>
                  <div class="info-row"><span class="info-label">Category</span><span class="info-value">${escapeHtml(e.category || '—')}</span></div>
                  <div class="info-row"><span class="info-label">Organizer</span><span class="info-value">${escapeHtml(e.orgId?.name || '—')}</span></div>
                </div>
                <div class="sidebar-card">
                  <h4><span class="material-symbols-outlined">group</span> Capacity</h4>
                  <div style="margin-bottom:0.75rem;">
                    <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:0.3rem;"><span style="font-weight:600;">${e.registeredCount || 0} / ${e.capacity || 0}</span><span style="color:var(--text-muted);">${e.capacity ? Math.round((e.registeredCount||0)/e.capacity*100) : 0}%</span></div>
                    <div class="progress"><div class="progress-fill" style="width:${e.capacity ? Math.min(100, (e.registeredCount||0)/e.capacity*100) : 0}%;"></div></div>
                  </div>
                  <div id="reg-actions"></div>
                </div>
              </div>
            </div>
          </div>`;

        const regEl = document.getElementById('reg-actions');
        if (user && !isOwner) {
          try {
            const myRegs = await api('/registrations/me');
            const myReg = (myRegs.data?.registrations || []).find(r => (r.eventId?._id || r.eventId) === eventId && r.status !== 'cancelled');
            if (myReg) {
              regEl.innerHTML = `<div style="display:flex;gap:0.5rem;"><span class="tag tag-green"><span class="tag-dot green"></span>${myReg.status}</span><button class="btn btn-ghost btn-sm" onclick="cancelRegistration()">Cancel</button></div>`;
            } else {
              regEl.innerHTML = `<button class="btn btn-primary" style="width:100%;" onclick="registerForEvent()"><span class="material-symbols-outlined">how_to_reg</span> Register</button>`;
            }
          } catch(e) { regEl.innerHTML = `<button class="btn btn-primary" style="width:100%;" onclick="registerForEvent()"><span class="material-symbols-outlined">how_to_reg</span> Register</button>`; }
        } else if (!user) {
          regEl.innerHTML = `<a href="/login.html" class="btn btn-primary" style="width:100%;text-align:center;">Sign in to register</a>`;
        }
      } catch(e) { document.getElementById('event-container').innerHTML = '<div class="empty-state" style="padding:5rem;"><div class="empty-icon"><span class="material-symbols-outlined">error</span></div><div class="empty-title">Failed to load event</div><div class="empty-text">' + escapeHtml(e.message) + '</div></div>'; }
    }

    async function registerForEvent() {
      try { await api('/registrations/' + eventId + '/register', { method: 'POST' }); showToast('Registered!', 'success'); loadEvent(); } catch(e) { showToast(e.message, 'error'); }
    }
    async function cancelRegistration() {
      if (!confirm('Cancel your registration?')) return;
      try { await api('/registrations/' + eventId + '/cancel', { method: 'PATCH' }); showToast('Cancelled', 'info'); loadEvent(); } catch(e) { showToast(e.message, 'error'); }
    }
    async function updateStatus(status) {
      try { await api('/events/' + eventId, { method: 'PATCH', body: JSON.stringify({ status }) }); showToast('Updated!', 'success'); loadEvent(); } catch(e) { showToast(e.message, 'error'); }
    }
    async function toggleRegistrations() {
      const panel = document.getElementById('registrations-panel');
      if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
      panel.style.display = 'block';
      panel.innerHTML = '<div class="spinner-center"><div class="spinner"></div></div>';
      try {
        const res = await api('/registrations/' + eventId);
        const regs = res.data?.registrations || [];
        if (!regs.length) { panel.innerHTML = '<div class="empty-text">No registrations yet.</div>'; return; }
        panel.innerHTML = '<div class="table-wrap"><table><thead><tr><th>User</th><th>Status</th><th>Action</th></tr></thead><tbody>' +
          regs.map(r => `<tr><td style="font-weight:500;">${escapeHtml(r.userId?.name || 'User')}</td><td>${statusBadge(r.status)}</td><td>${r.status !== 'attended' ? `<button class="btn btn-ghost btn-sm" onclick="markAttend('${r.userId?._id || r.userId}')">Mark</button>` : '<span class="tag tag-green"><span class="tag-dot green"></span>Attended</span>'}</td></tr>`).join('') +
          '</tbody></table></div>';
      } catch(e) { panel.innerHTML = '<div class="empty-text">Error: ' + escapeHtml(e.message) + '</div>'; }
    }
    async function markAttend(userId) {
      try { await api('/registrations/' + eventId + '/attendance/' + userId, { method: 'PATCH' }); showToast('Marked!', 'success'); toggleRegistrations(); } catch(e) { showToast(e.message, 'error'); }
    }
    function openFeedbackModal() { document.getElementById('feedback-modal').classList.add('active'); }
    function closeFeedbackModal() { document.getElementById('feedback-modal').classList.remove('active'); }
    async function handleFeedback(e) {
      e.preventDefault();
      const rating = parseInt(document.getElementById('feedback-rating').dataset.rating || '0');
      if (!rating) { showToast('Select a rating', 'error'); return; }
      try {
        await api('/feedback/' + eventId, { method: 'POST', body: JSON.stringify({ rating, comment: document.getElementById('feedback-comment').value }) });
        showToast('Review submitted!', 'success'); closeFeedbackModal(); loadEvent();
      } catch(e) { showToast(e.message, 'error'); }
    }
    loadEvent();
  </script>
</body>
</html>
