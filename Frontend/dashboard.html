<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .dash-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 56px); }
    .dash-sidebar {
      background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0;
    }
    .sidebar-header { padding: 0 1rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 0.75rem; }
    .sidebar-header h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.15rem; }
    .sidebar-header p { font-size: 0.75rem; color: var(--text-muted); }
    .sidebar-menu { list-style: none; }
    .sidebar-item {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1rem;
      font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);
      cursor: pointer; transition: all var(--transition); border-left: 3px solid transparent;
    }
    .sidebar-item:hover { color: var(--text); background: var(--bg); }
    .sidebar-item.active { color: var(--primary); background: var(--primary-light); border-left-color: var(--primary); font-weight: 600; }
    .sidebar-item .material-symbols-outlined { font-size: 18px; }
    .dash-main { padding: 1.5rem 2rem; }
    .dash-hero {
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      color: #fff; border-radius: var(--radius-lg); padding: 1.75rem 2rem;
      margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .dash-hero h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.2rem; }
    .dash-hero p { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .tab-content { margin-top: 1rem; }
    @media (max-width: 768px) {
      .dash-layout { grid-template-columns: 1fr; }
      .dash-sidebar { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <div class="dash-layout">
      <aside class="dash-sidebar">
        <div class="sidebar-header">
          <h3>Dashboard</h3>
          <p id="dash-role-copy">Overview of your workspace.</p>
        </div>
        <ul class="sidebar-menu" id="dashboard-menu">
          <li class="sidebar-item active" data-tab="overview" onclick="switchTab('overview', this)"><span class="material-symbols-outlined">dashboard</span> Overview</li>
        </ul>
      </aside>
      <main class="dash-main">
        <div class="dash-hero">
          <div>
            <h1 id="welcome-title">Dashboard</h1>
            <p id="welcome-subtitle">Loading workspace...</p>
          </div>
          <div id="dash-actions"></div>
        </div>
        <div class="stats-grid" id="dash-stats" style="margin-bottom:1.5rem;">
          <div class="stat-card"><div><div class="stat-label">Events</div><div class="stat-num" id="stat-events">—</div></div><div class="stat-icon blue"><span class="material-symbols-outlined">event</span></div></div>
          <div class="stat-card"><div><div class="stat-label">Registrations</div><div class="stat-num" id="stat-regs">—</div></div><div class="stat-icon green"><span class="material-symbols-outlined">group</span></div></div>
          <div class="stat-card"><div><div class="stat-label">Organizations</div><div class="stat-num" id="stat-orgs">—</div></div><div class="stat-icon amber"><span class="material-symbols-outlined">business</span></div></div>
          <div class="stat-card"><div><div class="stat-label">Upcoming</div><div class="stat-num" id="stat-upcoming">—</div></div><div class="stat-icon blue"><span class="material-symbols-outlined">schedule</span></div></div>
        </div>
        <div class="tab-content" id="tab-content"><div class="spinner-center"><div class="spinner"></div></div></div>
      </main>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) { throw new Error('Not authenticated'); }
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('dashboard');
    initNavbar();

    const user = Auth.getUser();
    const isOrg = Auth.isOrganizer();
    let myRegs = [], myEvents = [], myOrgs = [];

    if (user) {
      document.getElementById('welcome-title').textContent = `Welcome back, ${user.name}!`;
      document.getElementById('welcome-subtitle').textContent = `Role: ${user.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : 'User'}`;
      document.getElementById('dash-role-copy').textContent = isOrg ? 'Create and manage events.' : 'Track your registrations.';
    }
    if (isOrg) {
      document.getElementById('dash-actions').innerHTML = '<a href="/create-event.html" class="btn btn-primary btn-sm"><span class="material-symbols-outlined">add</span> New Event</a>';
    }

    async function loadDashboard() {
      try {
        const regRes = await api('/registrations/me');
        myRegs = regRes.data?.registrations || [];
        document.getElementById('stat-regs').textContent = myRegs.filter(r => r.status !== 'cancelled').length;
        const upcoming = myRegs.filter(r => new Date(r.eventId?.date) > new Date() && r.status !== 'cancelled').length;
        document.getElementById('stat-upcoming').textContent = upcoming;
      } catch(e) {}

      try {
        const orgRes = await api('/organizations');
        myOrgs = orgRes.data?.orgs || [];
        document.getElementById('stat-orgs').textContent = myOrgs.length;
      } catch(e) {}

      if (isOrg) {
        try {
          const evRes = await api('/events?createdBy=' + user.id + '&limit=50');
          myEvents = evRes.data?.events || [];
        } catch(e) { myEvents = []; }
        document.getElementById('stat-events').textContent = myEvents.length;
        setMenu([
          { tab: 'overview', icon: 'dashboard', label: 'Overview' },
          { tab: 'my-events', icon: 'event', label: 'My Events' },
          { tab: 'registrations', icon: 'confirmation_number', label: 'Registrations' },
          { tab: 'organizations', icon: 'business', label: 'Organizations' },
        ]);
      } else {
        setMenu([
          { tab: 'overview', icon: 'dashboard', label: 'Overview' },
          { tab: 'registrations', icon: 'confirmation_number', label: 'My Registrations' },
          { tab: 'feedback', icon: 'rate_review', label: 'Feedback' },
        ]);
      }
      switchTab('overview', document.querySelector('.sidebar-item'));
    }

    function setMenu(items) {
      document.getElementById('dashboard-menu').innerHTML = items.map((it, i) =>
        `<li class="sidebar-item ${i === 0 ? 'active' : ''}" data-tab="${it.tab}" onclick="switchTab('${it.tab}', this)"><span class="material-symbols-outlined">${it.icon}</span> ${it.label}</li>`
      ).join('');
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
      if (el) el.classList.add('active');
      const content = document.getElementById('tab-content');

      if (tab === 'overview') {
        const cards = isOrg ? [
          { icon: 'event', num: myEvents.length, text: 'Total events', color: 'blue' },
          { icon: 'group', num: myRegs.filter(r => r.status !== 'cancelled').length, text: 'Registrations', color: 'green' },
          { icon: 'business', num: myOrgs.length, text: 'Organizations', color: 'amber' },
          { icon: 'add_circle', num: '→', text: 'Create new event', color: 'blue', link: '/create-event.html' },
        ] : [
          { icon: 'event', num: myRegs.length, text: 'Joined events', color: 'blue' },
          { icon: 'schedule', num: document.getElementById('stat-upcoming').textContent, text: 'Upcoming', color: 'green' },
          { icon: 'rate_review', num: '→', text: 'Leave a review', color: 'amber' },
          { icon: 'explore', num: '→', text: 'Browse events', color: 'blue', link: '/events.html' },
        ];
        content.innerHTML = '<div class="stats-grid">' + cards.map(c =>
          `<div class="card" style="padding:1.25rem;${c.link ? 'cursor:pointer;' : ''}" ${c.link ? `onclick="window.location.href='${c.link}'"` : ''}><div style="display:flex;align-items:center;gap:0.75rem;"><div class="stat-icon ${c.color}"><span class="material-symbols-outlined">${c.icon}</span></div><div><div style="font-size:1.25rem;font-weight:700;">${c.num}</div><div style="font-size:0.8rem;color:var(--text-muted);">${c.text}</div></div></div></div>`
        ).join('') + '</div>';
        return;
      }

      if (tab === 'registrations') {
        if (myRegs.length === 0) { showEmpty(content, 'confirmation_number', 'No registrations yet', 'Browse events and register to participate.'); return; }
        content.innerHTML = '<div class="card" style="padding:0;"><div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-weight:600;">My Registrations</div><div style="overflow-x:auto;"><table><thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>' +
          myRegs.map(r => {
            const ev = r.eventId || {};
            return `<tr><td><a href="/event.html?id=${ev._id || ''}">${escapeHtml(ev.title || 'Event')}</a></td><td>${formatDate(ev.date)}</td><td>${statusBadge(r.status)}</td><td>${r.status === 'registered' || r.status === 'waitlisted' ? `<button class="btn btn-ghost btn-sm" onclick="cancelReg('${ev._id || ''}')">Cancel</button>` : '—'}</td></tr>`;
          }).join('') + '</tbody></table></div></div>';
        return;
      }

      if (tab === 'my-events') {
        if (myEvents.length === 0) { showEmpty(content, 'event', 'No events yet', 'Create your first event!'); return; }
        content.innerHTML = '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">' + myEvents.map((e, i) =>
          `<div class="card" style="cursor:pointer;" onclick="window.location.href='/event.html?id=${e._id}'"><div style="height:120px;background-size:cover;background-position:center;background-image:url('${getSampleBanner(i)}');border-bottom:1px solid var(--border);"></div><div class="card-body"><div style="margin-bottom:0.5rem;">${statusBadge(e.status)}</div><div style="font-size:0.95rem;font-weight:600;margin-bottom:0.2rem;">${escapeHtml(e.title || 'Event')}</div><div style="font-size:0.8rem;color:var(--text-muted);">${escapeHtml(e.venue || 'TBA')}</div></div></div>`
        ).join('') + '</div>';
        return;
      }

      if (tab === 'organizations') {
        if (myOrgs.length === 0) { showEmpty(content, 'business', 'No organizations', 'Create an organization to host events.'); return; }
        content.innerHTML = '<div class="stats-grid" style="grid-template-columns:repeat(2,1fr);">' + myOrgs.map(o =>
          `<div class="card card-body"><div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;"><div class="stat-icon amber"><span class="material-symbols-outlined">business</span></div><div><div style="font-weight:600;">${escapeHtml(o.name)}</div><div style="font-size:0.75rem;color:var(--text-muted);">Created ${formatDate(o.createdAt)}</div></div></div><div style="font-size:0.85rem;color:var(--text-secondary);">${escapeHtml(o.description || 'No description.')}</div></div>`
        ).join('') + '</div>';
        return;
      }

      if (tab === 'feedback') {
        content.innerHTML = '<div class="card card-body"><div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;"><span class="material-symbols-outlined" style="color:var(--text-muted);">rate_review</span><span style="font-weight:600;">Your Reviews</span></div><p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:1rem;">Leave reviews from event detail pages after attending events.</p><a href="/events.html" class="btn btn-primary btn-sm">Browse events</a></div>';
      }
    }

    async function cancelReg(eventId) {
      if (!confirm('Cancel registration?')) return;
      try { await api('/registrations/' + eventId + '/cancel', { method: 'PATCH' }); showToast('Cancelled', 'info'); loadDashboard(); } catch(e) { showToast(e.message, 'error'); }
    }

    loadDashboard();
  </script>
</body>
</html>
