<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event — EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .section-label {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .section-label .material-symbols-outlined { font-size: 16px; }
    .org-panel {
      border: 1px dashed var(--border-strong); border-radius: var(--radius);
      background: var(--bg); padding: 1rem; margin-bottom: 1rem;
    }
    .org-panel h4 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.4rem; }
    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <main class="main-content">
      <div class="page-header" style="padding:2rem 0 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);">
        <div class="container">
          <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:0.15rem;">Create Event</h1>
          <p style="font-size:0.85rem;color:var(--text-secondary);">Configure and publish a new event.</p>
        </div>
      </div>
      <div class="container" style="max-width:720px;padding-top:1.5rem;padding-bottom:3rem;">
        <div class="card" style="padding:1.5rem;">
          <form id="create-event-form" onsubmit="handleCreateEvent(event)">
            <div class="section-label"><span class="material-symbols-outlined">edit</span> Basic Details</div>
            <div class="form-group">
              <label class="form-label" for="event-title">Event Title *</label>
              <input class="form-input" type="text" id="event-title" placeholder="e.g., Tech Summit 2026" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="event-description">Description</label>
              <textarea class="form-textarea" id="event-description" placeholder="What is this event about?" rows="3"></textarea>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="event-category">Category</label>
                <select class="form-select" id="event-category">
                  <option value="">Select category</option>
                  <option>Technology</option><option>Business</option><option>Design</option>
                  <option>Education</option><option>Health</option><option>Social</option><option>Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="event-org">Host Organization *</label>
                <select class="form-select" id="event-org" required><option value="">Loading...</option></select>
                <button type="button" class="btn btn-ghost btn-sm" style="margin-top:0.35rem;" onclick="showNewOrgForm()" id="btn-new-org"><span class="material-symbols-outlined">add</span> Create organization</button>
              </div>
            </div>

            <div class="hidden" id="new-org-form">
              <div class="org-panel">
                <h4><span class="material-symbols-outlined">business</span> New Organization</h4>
                <div class="form-group"><label class="form-label" for="new-org-name">Name *</label><input class="form-input" type="text" id="new-org-name" placeholder="Organization name"></div>
                <div class="form-group"><label class="form-label" for="new-org-desc">Description</label><input class="form-input" type="text" id="new-org-desc" placeholder="Short description"></div>
                <div style="display:flex;gap:0.5rem;">
                  <button type="button" class="btn btn-primary btn-sm" onclick="createOrg()">Save</button>
                  <button type="button" class="btn btn-ghost btn-sm" onclick="hideNewOrgForm()">Cancel</button>
                </div>
              </div>
            </div>

            <div class="section-label" style="margin-top:1.25rem;"><span class="material-symbols-outlined">schedule</span> Timing</div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="event-date">Date & Time *</label>
                <input class="form-input" type="datetime-local" id="event-date" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="event-deadline">Registration Deadline *</label>
                <input class="form-input" type="datetime-local" id="event-deadline" required>
              </div>
            </div>

            <div class="section-label" style="margin-top:1.25rem;"><span class="material-symbols-outlined">local_shipping</span> Logistics</div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="event-venue">Venue / Link *</label>
                <input class="form-input" type="text" id="event-venue" placeholder="Address or video link" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="event-capacity">Max Capacity *</label>
                <input class="form-input" type="number" id="event-capacity" min="1" placeholder="e.g. 200" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="event-status">Status</label>
              <select class="form-select" id="event-status">
                <option value="draft">Draft</option>
                <option value="published" selected>Published</option>
              </select>
            </div>

            <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:0.75rem;">
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="btn-create-event">
                <span class="material-symbols-outlined">publish</span> Publish Event
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) { throw new Error('Not authenticated'); }
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('create');
    initNavbar();

    async function loadOrgs() {
      try {
        const res = await api('/organizations');
        const orgs = res.data?.orgs || [];
        const sel = document.getElementById('event-org');
        sel.innerHTML = orgs.length === 0
          ? '<option value="">No organizations — create one below</option>'
          : '<option value="">Select organization</option>' + orgs.map(o => `<option value="${o._id}">${escapeHtml(o.name)}</option>`).join('');
      } catch(e) { console.error(e); }
    }

    function showNewOrgForm() { document.getElementById('new-org-form').classList.remove('hidden'); }
    function hideNewOrgForm() { document.getElementById('new-org-form').classList.add('hidden'); }

    async function createOrg() {
      const name = document.getElementById('new-org-name').value.trim();
      if (!name) { showToast('Name required', 'error'); return; }
      try {
        const res = await api('/organizations', { method: 'POST', body: JSON.stringify({ name, description: document.getElementById('new-org-desc').value }) });
        showToast('Organization created!', 'success');
        hideNewOrgForm();
        await loadOrgs();
        document.getElementById('event-org').value = res.data.org._id;
      } catch(e) { showToast(e.message, 'error'); }
    }

    async function handleCreateEvent(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-create-event');
      btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Publishing...';
      try {
        const data = {
          title: document.getElementById('event-title').value,
          description: document.getElementById('event-description').value,
          category: document.getElementById('event-category').value,
          orgId: document.getElementById('event-org').value,
          date: new Date(document.getElementById('event-date').value).toISOString(),
          registrationDeadline: new Date(document.getElementById('event-deadline').value).toISOString(),
          venue: document.getElementById('event-venue').value,
          capacity: parseInt(document.getElementById('event-capacity').value),
          status: document.getElementById('event-status').value,
        };
        if (!data.orgId) { showToast('Select an organization', 'error'); btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined">publish</span> Publish Event'; return; }
        const res = await api('/events', { method: 'POST', body: JSON.stringify(data) });
        showToast('Event created!', 'success');
        setTimeout(() => window.location.href = '/event.html?id=' + res.data.event._id, 300);
      } catch(err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined">publish</span> Publish Event';
      }
    }

    loadOrgs();
  </script>
</body>
</html>
