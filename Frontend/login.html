<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — EventSphere</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .auth-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .auth-visual {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 3rem; position: relative; overflow: hidden;
    }
    .auth-visual::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(79,70,229,0.1), transparent 60%);
    }
    .auth-visual-title {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 700;
      color: #fff; text-align: center; line-height: 1.15;
      position: relative; z-index: 2; max-width: 320px;
    }
    .auth-visual-title span { color: #60a5fa; }
    .auth-visual-sub {
      font-size: 0.95rem; color: rgba(255,255,255,0.6); text-align: center;
      margin-top: 1rem; position: relative; z-index: 2; max-width: 300px; line-height: 1.6;
    }
    .auth-form-side {
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem; background: var(--surface);
    }
    .auth-card { max-width: 380px; width: 100%; margin: 0 auto; }
    .auth-card h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .auth-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.75rem; }
    .auth-divider { text-align: center; margin: 1.25rem 0; position: relative; }
    .auth-divider::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: var(--border);
    }
    .auth-divider span {
      position: relative; background: var(--surface); padding: 0 0.75rem;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary); }
    .auth-footer a { font-weight: 600; }
    @media (max-width: 768px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-visual { display: none; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="auth-layout">
      <div class="auth-visual">
        <div class="auth-visual-title">Enterprise event operations <span>made simple.</span></div>
        <p class="auth-visual-sub">Lifecycle control, capacity management, and role-aware access — all in one platform.</p>
      </div>
      <div class="auth-form-side">
        <div class="auth-card">
          <a href="/" style="display:inline-flex;align-items:center;gap:0.5rem;font-weight:700;font-size:0.95rem;color:var(--text);text-decoration:none;margin-bottom:2rem;">
            <div class="brand-icon" style="width:28px;height:28px;border-radius:6px;"><span class="material-symbols-outlined" style="font-size:16px;">event</span></div>
            EventSphere
          </a>
          <h1>Welcome back</h1>
          <p>Sign in to your account to continue.</p>
          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="login-email">Email address</label>
              <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">Password</label>
              <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;" id="btn-login">
              Sign in
            </button>
          </form>
          <div class="auth-footer">
            Don't have an account? <a href="/signup.html">Create one</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.replace('/dashboard.html');

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        Auth.save(res.data);
        showToast('Welcome back!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 300);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
